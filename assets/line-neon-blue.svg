<svg width="800" height="6" viewBox="0 0 800 6" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7aa2f7" stop-opacity="0"/>
      <stop offset="50%" stop-color="#7aa2f7" stop-opacity="1"/>
      <stop offset="100%" stop-color="#7aa2f7" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="2" y="2" fill="#1a1b27" opacity="0.3" rx="1"/>
  <rect width="300" height="4" y="1" fill="url(#glow)" rx="2">
    <animate attributeName="x" values="-300; 800" dur="2s" repeatCount="indefinite" />
  </rect>
</svg>
